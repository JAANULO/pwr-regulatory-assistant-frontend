<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorium Regulaminowe / Tryb Symulacji PWr</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(22, 28, 45, 0.85);
            --text-color: #e2e8f0;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --neon-pink: #ec4899;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #090e17 0%, #111827 100%);
            color: var(--text-color);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px 40px;
            background: rgba(14, 20, 31, 0.9);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: -webkit-linear-gradient(45deg, var(--accent), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
        }

        /* Lewy Panel - Formularz */
        .controls-panel {
            width: 380px;
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        .control-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 5px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
            transition: 0.2s;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #fff;
        }

        input[type="text"] {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        button.run-btn {
            background: linear-gradient(90deg, var(--accent), #3b82f6);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        /* Prawy Panel - Wykres */
        .chart-panel {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .chart-container {
            flex: 1;
            position: relative;
            width: 100%;
        }

        .log-box {
            margin-top: 20px;
            height: 80px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #64748b;
            overflow-y: auto;
        }

        .log-entry { margin-bottom: 5px; }
        .log-entry.success { color: #10b981; }

        .btn-outline {
            background: transparent;
            border: 1px solid #64748b;
            color: #cbd5e1;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>

<header>
    <h1>Laboratorium PWr Core</h1>
    <div>
        <button class="btn-outline" onclick="window.location.href='/'">Wróć do Asystenta</button>
        <button class="btn-outline" onclick="eksportujUstawienia()" style="margin-left: 10px; border-color: var(--neon-pink); color: var(--neon-pink);">Zapisz Ustawienia (JSON)</button>
    </div>
</header>

<div class="container">
    <div class="controls-panel">
        <div>
            <h3 style="margin-top: 0; color: #fff;">Test Query</h3>
            <div class="control-group">
                <input type="text" id="queryInput" value="jakie sa zasady powtarzania przedmiotu" placeholder="Wpisz zapytanie...">
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 5px 0;">

        <div>
            <h3 style="margin-top: 0; color: #fff;">Wektoryzacja (Ad-Hoc)</h3>

            <div class="control-group">
                <label>BM25 K1 (Nasycenie) <span id="k1_val">1.50</span></label>
                <input type="range" id="param_k1" min="0.1" max="3.0" step="0.1" value="1.5">
            </div>

            <div class="control-group" style="margin-top: 20px;">
                <label>BM25 B (Normalizacja Długości) <span id="b_val">0.75</span></label>
                <input type="range" id="param_b" min="0.0" max="1.0" step="0.05" value="0.75">
            </div>

            <div class="control-group" style="margin-top: 20px;">
                <label>Siła Synonimów (TF Multiplier) <span id="syn_val">1.00</span></label>
                <input type="range" id="param_syn" min="0.0" max="5.0" step="0.1" value="1.0">
            </div>

            <div class="control-group" style="margin-top: 20px;">
                <label>Próg Pewności ("Nie wiem") <span id="threshold_val">0.10</span></label>
                <input type="range" id="param_threshold" min="0.0" max="0.5" step="0.01" value="0.10">
            </div>
        </div>

        <button class="run-btn" id="runTestBtn" onclick="uruchomSymulacje()">Symuluj Uderzenie</button>
    </div>

    <div class="chart-panel">
        <h3 style="margin-top: 0; color: #fff;">Delta Impact (Podobieństwo Cosinusowe)</h3>
        <div class="chart-container">
            <canvas id="simChart"></canvas>
        </div>
        <div class="log-box" id="logBox">
            <div class="log-entry">> Gotowość operacyjna. Przesuń suwaki i zasymuluj wahania wag rdzenia.</div>
        </div>
    </div>
</div>

<script>
    // Aktualizacja wskaźników z suwaków
    const paramInputs = ['k1', 'b', 'syn', 'threshold'];
    paramInputs.forEach(id => {
        const el = document.getElementById(`param_${id}`);
        const valEl = document.getElementById(`${id}_val`);
        el.addEventListener('input', (e) => {
            valEl.innerText = parseFloat(e.target.value).toFixed(2);
        });
    });

    function logMessage(msg, type="normal") {
        const box = document.getElementById('logBox');
        const r = document.createElement('div');
        r.className = 'log-entry ' + type;
        const time = new Date().toLocaleTimeString();
        r.innerText = `[${time}] ${msg}`;
        box.insertBefore(r, box.firstChild);
    }

    // Inicjalizacja Wykresu Chart.js
    const ctx = document.getElementById('simChart').getContext('2d');
    const simChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                {
                    label: 'Base Line (Domyślny algorytm)',
                    data: [],
                    borderColor: 'rgba(100, 116, 139, 0.5)',
                    backgroundColor: 'rgba(100, 116, 139, 0.1)',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    fill: false,
                    tension: 0.3,
                    pointRadius: 4
                },
                {
                    label: 'Delta (Wynik po zmianach parametrów)',
                    data: [],
                    borderColor: '#22d3ee',
                    backgroundColor: 'rgba(34, 211, 238, 0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#22d3ee',
                    pointRadius: 6,
                    pointHoverRadius: 8
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1.0,
                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                    ticks: { color: '#94a3b8' },
                    title: { display: true, text: 'Wskaźnik Pewności (Cosine)', color: '#94a3b8'}
                },
                x: {
                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                    ticks: { color: '#94a3b8' }
                }
            },
            plugins: {
                legend: { labels: { color: '#e2e8f0', usePointStyle: true, boxWidth: 8 } }
            }
        }
    });

    let epoka = 0;
    const API_BASE_URL = 'http://127.0.0.1:5000';

    async function uruchomSymulacje() {
        const payload = {
            pytanie: document.getElementById('queryInput').value,
            k1: document.getElementById('param_k1').value,
            b: document.getElementById('param_b').value,
            syn_weight: document.getElementById('param_syn').value,
            threshold: document.getElementById('param_threshold').value
        };

        const btn = document.getElementById('runTestBtn');
        btn.innerText = "PRZELICZANIE MACIERZY...";
        btn.style.opacity = 0.5;

        try {
            const res = await fetch(`${API_BASE_URL}/zapytaj_symulacja`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if(data.blad) throw new Error(data.blad);

            epoka++;
            simChart.data.labels.push(`Uderz.${epoka}`);
            simChart.data.datasets[0].data.push(data.base_score);
            simChart.data.datasets[1].data.push(data.delta_score);

            // Utrzymujemy tylko 15 ostatnich uderzen
            if(simChart.data.labels.length > 15) {
                simChart.data.labels.shift();
                simChart.data.datasets[0].data.shift();
                simChart.data.datasets[1].data.shift();
            }

            simChart.update();
            logMessage(`✅ Uderzenie ${epoka}: Base[${data.base_score.toFixed(3)}] Delta[${data.delta_score.toFixed(3)}] - Trafienie: '${data.delta_title}'`, 'success');

        } catch (e) {
            logMessage(`❌ BŁĄD: ${e.message}`, 'error');
        } finally {
            btn.innerText = "Symuluj Uderzenie";
            btn.style.opacity = 1.0;
        }
    }

    function eksportujUstawienia() {
        const out = {
            k1: document.getElementById('param_k1').value,
            b: document.getElementById('param_b').value,
            synonym_weight: document.getElementById('param_syn').value,
            confidence_threshold: document.getElementById('param_threshold').value,
            timestamp: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ustawienia_pwr_lab_${Date.now()}.json`;
        a.click();
        logMessage(`Zgrano konfigurację JSON do pliku wyjściowego.`, 'success');
    }

</script>
</body>
</html>
