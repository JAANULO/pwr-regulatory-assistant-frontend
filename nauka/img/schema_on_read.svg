<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="100%" height="100%">
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .svg-font {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .header-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      fill: #f8fafc;
      font-size: 15px;
      letter-spacing: 0.05em;
    }
    .box {
      fill: rgba(30, 41, 59, 0.45);
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 1.5px;
      rx: 16px;
      transition: all 0.3s ease;
    }
    .box-write {
      stroke: rgba(239, 68, 68, 0.3);
    }
    .box-write:hover {
      stroke: #ef4444;
      fill: rgba(239, 68, 68, 0.05);
      filter: url(#glow-blue);
    }
    .box-read {
      stroke: rgba(56, 189, 248, 0.3);
    }
    .box-read:hover {
      stroke: #38bdf8;
      fill: rgba(56, 189, 248, 0.05);
      filter: url(#glow-blue);
    }
    .badge {
      font-weight: 700;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .label-title {
      font-weight: 600;
      fill: #f1f5f9;
      font-size: 13px;
    }
    .label-body {
      fill: #94a3b8;
      font-size: 11px;
    }
    .label-code {
      fill: #cbd5e1;
      font-family: 'Fira Code', monospace;
      font-size: 9px;
    }
    .arrow {
      stroke: #475569;
      stroke-width: 1.5;
      fill: none;
      stroke-dasharray: 4 3;
      transition: stroke 0.3s;
    }
    .arrow-active {
      stroke: #38bdf8;
      stroke-dasharray: none;
      stroke-width: 2;
    }
    .marker-arrow {
      fill: #475569;
    }
    .marker-active {
      fill: #38bdf8;
    }
    .icon {
      transition: transform 0.3s;
    }
    .box:hover + .icon {
      transform: scale(1.05);
    }
  </style>

  <g class="svg-font">
    <!-- TŁO DLA PODGLĄDU -->
    <rect width="600" height="260" fill="#0f172a" rx="20" />

    <!-- LEWA KOLUMNA: SCHEMA-ON-WRITE -->
    <g transform="translate(30, 20)">
      <rect class="box box-write" width="240" height="220" />
      
      <!-- BADGE -->
      <rect x="20" y="20" width="110" height="18" rx="9" fill="rgba(239, 68, 68, 0.1)" stroke="rgba(239, 68, 68, 0.2)" />
      <text class="badge" x="75" y="32" fill="#ef4444" text-anchor="middle">Schema-on-Write</text>
      
      <text class="label-title" x="20" y="60">Tradycyjny SQL</text>
      <text class="label-body" x="20" y="78">Weryfikacja schematu przy zapisie.</text>
      <text class="label-body" x="20" y="93">Wymaga sztywnej struktury tabeli.</text>

      <!-- WIZUALIZACJA TABELI -->
      <g transform="translate(20, 115)">
        <rect width="200" height="80" rx="6" fill="#1e293b" stroke="rgba(255,255,255,0.05)" />
        <line x1="0" y1="24" x2="200" y2="24" stroke="rgba(255,255,255,0.1)" />
        <line x1="80" y1="0" x2="80" y2="80" stroke="rgba(255,255,255,0.1)" />
        <!-- Nagłówki -->
        <text class="label-code" x="10" y="16" fill="#ef4444" font-weight="bold">id (INT)</text>
        <text class="label-code" x="90" y="16" fill="#ef4444" font-weight="bold">tresc (VARCHAR)</text>
        <!-- Dane -->
        <text class="label-code" x="10" y="42" fill="#94a3b8">1</text>
        <text class="label-code" x="90" y="42" fill="#f1f5f9">Egzaminy...</text>
        <text class="label-code" x="10" y="62" fill="#94a3b8">2</text>
        <text class="label-code" x="90" y="62" fill="#f87171">[BŁĄD: dict/JSON]</text>
      </g>
    </g>

    <!-- POŁĄCZENIE (STRZAŁKA PORÓWNAWCZA) -->
    <path class="arrow" d="M 285,130 L 300,130" stroke-width="2" />

    <!-- PRAWA KOLUMNA: SCHEMA-ON-READ -->
    <g transform="translate(330, 20)">
      <rect class="box box-read" width="240" height="220" />
      
      <!-- BADGE -->
      <rect x="20" y="20" width="110" height="18" rx="9" fill="rgba(56, 189, 248, 0.1)" stroke="rgba(56, 189, 248, 0.2)" />
      <text class="badge" x="75" y="32" fill="#38bdf8" text-anchor="middle">Schema-on-Read</text>
      
      <text class="label-title" x="20" y="60">Dokumentowy JSON</text>
      <text class="label-body" x="20" y="78">Brak walidacji przy zapisie. Dowolny</text>
      <text class="label-body" x="20" y="93">zapis struktury. Schemat narzuca kod.</text>

      <!-- WIZUALIZACJA JSON -> PARSER -->
      <g transform="translate(20, 115)">
        <rect width="200" height="80" rx="6" fill="#1e293b" stroke="rgba(255,255,255,0.05)" />
        <text class="label-code" x="10" y="20" fill="#a855f7">[Baza Wiedzy JSON]</text>
        <text class="label-code" x="15" y="38" fill="#f1f5f9">{</text>
        <text class="label-code" x="25" y="52" fill="#38bdf8">"tresc": <tspan fill="#f1f5f9">"§ 18..."</tspan>,</text>
        <text class="label-code" x="25" y="66" fill="#38bdf8">"dodatki": <tspan fill="#64748b">[unikalne]</tspan></text>
        <text class="label-code" x="15" y="75" fill="#f1f5f9">}</text>
      </g>
    </g>

    <!-- PROCES INTERPRETACJI (DOLNY ŁĄCZNIK) -->
    <path class="arrow arrow-active" d="M 450,225 L 450,232 L 350,232" marker-end="url(#arrow-head)" />
  </g>
</svg>
